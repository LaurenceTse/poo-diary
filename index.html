<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#FFF6EA" />
    <title>噗噗日记</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&family=ZCOOL+KuaiLe&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./css/styles.css" />
  </head>
  <body>
    <div class="device-shell">
      <div class="phone" id="app">
        <div class="status-bar">
          <span id="status-time">9:41</span>
          <div class="status-icons" aria-hidden="true">
            <span class="signal"></span>
            <span class="wifi"></span>
            <span class="battery"></span>
          </div>
        </div>

        <main class="screen" id="screen">
          <!-- Today / Calendar / Mine injected by JS -->
        </main>

        <nav class="tab-bar" id="tab-bar" aria-label="主导航">
          <button class="tab active" data-tab="today" type="button">
            <span class="tab-emoji">☀️</span>
            <span>今天</span>
          </button>
          <button class="tab" data-tab="calendar" type="button">
            <span class="tab-emoji">📅</span>
            <span>日历</span>
          </button>
          <button class="tab" data-tab="mine" type="button">
            <span class="tab-emoji">🧸</span>
            <span>我的</span>
          </button>
        </nav>

        <!-- Full-screen emotional feedback overlay -->
        <div class="feedback-overlay" id="feedback-overlay" hidden>
          <div class="confetti-layer" id="confetti-layer" aria-hidden="true"></div>
          <div class="feedback-content" id="feedback-content"></div>
        </div>

        <!-- Share sheet -->
        <div class="sheet-overlay" id="share-sheet" hidden>
          <div class="sheet sheet-share">
            <div class="sheet-handle"></div>
            <h3 id="share-title">今日肚肚小报</h3>
            <p class="sheet-sub" id="share-sub">只晒称号，不晒次数 · 可保存到相册</p>
            <div class="poster-wrap">
              <canvas id="share-canvas" width="360" height="480" aria-label="肚肚小报分享图"></canvas>
            </div>
            <button class="btn btn-primary" id="save-share" type="button">
              保存到相册 🖼️
            </button>
            <button class="btn btn-secondary" id="toggle-share-mode" type="button">
              切换今日 / 本周
            </button>
            <button class="btn btn-ghost" id="close-share" type="button">先不发了</button>
          </div>
        </div>

        <!-- Toast -->
        <div class="toast" id="toast" hidden></div>
      </div>
    </div>

    <script type="module" src="./js/app.js"></script>
  </body>
</html>
